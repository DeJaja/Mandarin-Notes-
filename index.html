<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语笔记本 · Mandarin Notebook</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500&family=Outfit:wght@300;400;500;600&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0B0E14; --surface: #10141C; --card: #161B26; --card2: #1C2233;
  --border:  rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --red:     #C93A2B; --red-dim: rgba(201,58,43,0.15);
  --gold:    #C4933A; --green: #2D9E6B; --blue: #2D7DD2; --purple: #7B5EA7;
  --text:    #E8E2D9; --muted: #8A9BB0; --faint: #4A5568;
  --sans:    'Outfit', system-ui, sans-serif;
  --serif:   'Lora', Georgia, serif;
  --zh:      'Noto Serif SC', 'Songti SC', serif;
  --mono:    'DM Mono', monospace;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
}
html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; line-height: 1.7; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
@keyframes spin   { to { transform: rotate(360deg); } }
.fu  { animation: fadeUp .3s ease both; }
.fu1 { animation: fadeUp .3s .07s ease both; }
.fu2 { animation: fadeUp .3s .14s ease both; }
input, select, button { font-family: var(--sans); outline: none; }

.inp { width:100%; background:var(--card); border:1px solid var(--border2); border-radius:var(--r-md); padding:10px 13px; color:var(--text); font-size:.88rem; transition:border-color .2s; }
.inp:focus { border-color: var(--red); }
.inp::placeholder { color: var(--faint); }

.sel { background:var(--card); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; color:var(--text); font-size:.8rem; cursor:pointer; transition:border-color .2s; }
.sel:focus { border-color: var(--red); }

.btn { display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--border2); border-radius:var(--r-sm); padding:7px 16px; color:var(--muted); font-size:.82rem; cursor:pointer; transition:background .15s, color .15s; white-space:nowrap; }
.btn:hover { background:var(--card2); color:var(--text); }
.btn.primary { background:var(--red); border-color:var(--red); color:#fff; }
.btn.primary:hover { background:#a82e21; }
.btn.danger  { color:#f08080; border-color:rgba(201,58,43,.3); }
.btn.danger:hover { background:rgba(201,58,43,.1); }

.badge { display:inline-block; padding:2px 9px; border-radius:4px; font-size:.7rem; font-weight:500; white-space:nowrap; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1.75rem; display:flex; align-items:center; justify-content:space-between; height:58px; gap:12px; flex-shrink:0; position:sticky; top:0; z-index:100; }
.brand { display:flex; align-items:center; gap:12px; }
.brand-zh { font-family:var(--zh); font-size:28px; color:var(--red); line-height:1; }
.brand-name { font-family:var(--serif); font-size:.95rem; font-weight:500; }
.brand-count { font-size:.7rem; color:var(--faint); margin-top:1px; }
.nav { display:flex; align-items:center; gap:3px; }
.nav-btn { background:transparent; border:none; padding:7px 15px; color:var(--muted); font-size:.82rem; font-family:var(--sans); cursor:pointer; border-radius:var(--r-sm); transition:color .15s, background .15s; position:relative; }
.nav-btn:hover { color:var(--text); background:var(--card2); }
.nav-btn.active { color:var(--text); background:var(--red-dim); }
.nav-btn.active::after { content:''; position:absolute; bottom:-1px; left:20%; right:20%; height:2px; background:var(--red); border-radius:2px 2px 0 0; }

.main { padding:1.75rem; max-width:1400px; margin:0 auto; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:10px; margin-bottom:1.5rem; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:14px 16px; transition:border-color .2s; }
.stat-card:hover { border-color:var(--border2); }
.stat-num { font-family:var(--serif); font-size:1.6rem; font-weight:500; line-height:1; margin-bottom:5px; }
.stat-lbl { font-size:.67rem; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }

/* FILTERS */
.filter-bar { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
.search-wrap { flex:1; min-width:200px; position:relative; }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:13px; pointer-events:none; }
.search-inp { width:100%; background:var(--card); border:1px solid var(--border2); border-radius:var(--r-md); padding:9px 13px 9px 34px; color:var(--text); font-size:.85rem; font-family:var(--sans); transition:border-color .2s; }
.search-inp:focus { border-color:var(--red); outline:none; }
.search-inp::placeholder { color:var(--faint); }

/* TABLE */
.tbl-wrap { border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:680px; }
thead tr { background:var(--surface); }
thead th { text-align:left; padding:12px 16px; font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); border-bottom:1px solid var(--border); white-space:nowrap; font-weight:500; }
tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--card); }
tbody tr.expandable { cursor:pointer; }
tbody tr.ex-row { background:var(--surface) !important; cursor:default; }
td { padding:13px 16px; font-size:.92rem; vertical-align:middle; }
.c-zh  { font-family:var(--zh); font-size:1.35rem; white-space:nowrap; }
.c-pin { font-family:var(--mono); font-style:italic; color:var(--gold); font-size:.85rem; white-space:nowrap; }
.c-num { color:var(--faint); font-size:.8rem; }
.c-eng { color:#ccc5bb; max-width:240px; font-size:.92rem; }

/* LESSONS */
.lessons-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
.lessons-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(258px,1fr)); gap:12px; }
.lcard { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:1.25rem; position:relative; overflow:hidden; transition:border-color .2s, transform .18s; display:flex; flex-direction:column; }
.lcard:hover { border-color:var(--border2); transform:translateY(-1px); }
.lcard-accent { position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--r-lg) var(--r-lg) 0 0; }
.lcard-title { font-family:var(--serif); font-size:.95rem; font-weight:500; margin-top:8px; margin-bottom:3px; }
.lcard-meta  { font-size:.72rem; color:var(--faint); margin-bottom:11px; }
.lcard-acts  { display:flex; gap:7px; margin-top:auto; padding-top:12px; }

/* UPLOAD */
.upload-wrap { max-width:580px; }
.upload-zone { border:1.5px dashed var(--border2); border-radius:var(--r-lg); padding:3rem 2rem; text-align:center; cursor:pointer; background:var(--card); transition:border-color .2s, background .2s; }
.upload-zone:hover { border-color:rgba(201,58,43,.45); background:var(--card2); }
.upload-zone.busy  { cursor:not-allowed; border-color:var(--red); }
.status-box { margin-top:1rem; background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1rem 1.25rem; }
.status-msg     { font-size:.85rem; color:var(--muted); }
.status-msg.ok  { color:var(--green); }
.status-msg.err { color:#ff8080; }
.prog-bar  { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:11px; }
.prog-fill { height:100%; background:var(--red); border-radius:2px; transition:width .4s ease; }
.apikey-box { margin-top:1.25rem; background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1rem 1.25rem; }
.apikey-lbl  { font-size:.72rem; color:var(--faint); text-transform:uppercase; letter-spacing:.07em; display:block; margin-bottom:7px; }
.apikey-note { font-size:.75rem; color:var(--faint); margin-top:8px; line-height:1.65; }
.apikey-note a { color:var(--blue); text-decoration:none; }
.apikey-note a:hover { text-decoration:underline; }
.upload-types { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:1.25rem; }
.utype-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:12px 14px; }

/* EMPTY */
.empty { text-align:center; padding:4rem 2rem; background:var(--card); border-radius:var(--r-lg); border:1px solid var(--border); }
.empty-zh  { font-family:var(--zh); font-size:52px; color:var(--red); opacity:.2; margin-bottom:1rem; }
.empty-ttl { font-family:var(--serif); font-size:1.05rem; color:var(--muted); margin-bottom:7px; }
.empty-sub { font-size:.82rem; color:var(--faint); margin-bottom:1.5rem; }
.res-info { font-size:.74rem; color:var(--faint); margin-bottom:8px; }

.spinner { width:20px; height:20px; border:2px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }

/* ── PRACTICE ── */
@keyframes popIn  { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
@keyframes shake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }
@keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.45} }

.prac-setup { max-width:720px; margin:0 auto; }
.prac-modes { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:1.5rem; }
.prac-mode-card {
  background:var(--card); border:2px solid var(--border); border-radius:var(--r-lg);
  padding:1.5rem 1.25rem; text-align:center; cursor:pointer;
  transition:border-color .18s, transform .18s, background .18s;
}
.prac-mode-card:hover { border-color:var(--border2); transform:translateY(-2px); background:var(--card2); }
.prac-mode-card.selected { border-color:var(--red); background:var(--red-dim); }
.prac-mode-icon  { font-size:2rem; margin-bottom:.6rem; line-height:1; }
.prac-mode-title { font-family:var(--serif); font-size:1rem; font-weight:500; margin-bottom:5px; }
.prac-mode-desc  { font-size:.78rem; color:var(--muted); line-height:1.5; }

/* Card count chips */
.count-chips { display:flex; gap:8px; flex-wrap:wrap; }
.count-chip {
  background:var(--card2); border:1.5px solid var(--border2);
  border-radius:99px; padding:6px 18px; font-size:.85rem;
  color:var(--muted); cursor:pointer; transition:all .15s;
}
.count-chip:hover { color:var(--text); border-color:var(--border2); }
.count-chip.selected { background:var(--red); border-color:var(--red); color:#fff; font-weight:500; }

.prac-opts { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:1.5rem; margin-bottom:1.25rem; }
.prac-opts-title { font-size:.75rem; color:var(--faint); text-transform:uppercase; letter-spacing:.09em; margin-bottom:1.1rem; font-weight:500; }
.prac-opts-row   { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:.9rem; }
.prac-opts-row:last-child { margin-bottom:0; }
.prac-lbl { font-size:.85rem; color:var(--muted); min-width:80px; font-weight:500; }

/* Progress */
.prac-prog-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.5rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:16px; }
.prac-prog-bar  { flex:1; height:7px; background:var(--border2); border-radius:4px; overflow:hidden; }
.prac-prog-fill { height:100%; background:var(--red); border-radius:4px; transition:width .35s ease; }
.prac-prog-txt  { font-size:.82rem; color:var(--muted); white-space:nowrap; }

/* FLASHCARD */
@keyframes cardReveal { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:none} }
@keyframes cardFlip   { 0%{opacity:0;transform:rotateY(-12deg) scale(.97)} 100%{opacity:1;transform:none} }

.fc-card {
  background:var(--card);
  border:2px solid var(--border2);
  border-radius:var(--r-lg);
  min-height:280px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2.5rem 2rem;
  text-align:center;
  cursor:pointer;
  margin-bottom:1.25rem;
  animation:cardReveal .2s ease both;
  position:relative;
  transition:border-color .2s;
}
.fc-card:hover { border-color:rgba(255,255,255,.22); }
.fc-card.revealed { animation:cardFlip .25s ease both; border-color:rgba(196,147,58,.35); }

.fc-face-label {
  position:absolute; top:1.1rem; left:50%; transform:translateX(-50%);
  font-size:.7rem; color:var(--faint); text-transform:uppercase;
  letter-spacing:.1em; white-space:nowrap;
}
.fc-badge-row { margin-bottom:1rem; }
.fc-zh-lg { font-family:var(--zh); font-size:clamp(1.6rem,5vw,3.8rem); line-height:1.25; color:var(--text); margin-bottom:.5rem; word-break:break-all; }
.fc-zh-sm { font-family:var(--zh); font-size:clamp(1.1rem,3vw,1.6rem); line-height:1.5; color:var(--text); margin-bottom:.5rem; }
.fc-pin-row { font-family:var(--mono); font-style:italic; color:var(--gold); font-size:1.1rem; margin-bottom:.85rem; }
.fc-eng-row { font-size:1.05rem; color:#ccc5bb; line-height:1.65; max-width:480px; }
.fc-eng-lg  { font-size:1.2rem; color:var(--text); line-height:1.65; max-width:460px; }
.fc-ex-row  { font-size:.88rem; color:var(--muted); font-style:italic; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); max-width:460px; line-height:1.65; }
.fc-tap-hint { font-size:.78rem; color:var(--faint); margin-top:1rem; animation:pulse 2.2s ease infinite; }

.fc-actions { display:flex; gap:12px; justify-content:center; margin-bottom:1.25rem; }
.fc-btn { flex:1; max-width:230px; padding:15px 20px; border:none; border-radius:var(--r-md); font-size:.95rem; font-family:var(--sans); font-weight:500; cursor:pointer; transition:transform .15s; }
.fc-btn:hover { transform:translateY(-2px); }
.fc-btn:active { transform:scale(.97); }
.fc-btn.know   { background:#1a4a30; color:#4dd892; border:1px solid rgba(45,158,107,.3); }
.fc-btn.know:hover   { background:#1f5438; }
.fc-btn.unsure { background:#3a1a18; color:#f08080; border:1px solid rgba(201,58,43,.3); }
.fc-btn.unsure:hover { background:#481f1c; }
.fc-btn-nav { background:transparent; border:1px solid var(--border); color:var(--faint); border-radius:var(--r-sm); padding:8px 20px; font-size:.83rem; font-family:var(--sans); cursor:pointer; transition:color .15s, border-color .15s; }
.fc-btn-nav:hover { color:var(--muted); border-color:var(--border2); }

/* QUIZ (multiple choice) */
.qz-wrap  { max-width:620px; margin:0 auto; animation:popIn .3s ease; }
.qz-q-card { background:var(--card); border:1px solid var(--border2); border-radius:var(--r-lg); padding:2.75rem 2rem; text-align:center; margin-bottom:1.25rem; }
.qz-q-label { font-size:.75rem; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1.25rem; }
.qz-q-zh  { font-family:var(--zh); font-size:3.5rem; color:var(--text); line-height:1.25; margin-bottom:.5rem; }
.qz-q-pin { font-family:var(--mono); font-style:italic; color:var(--gold); font-size:1.05rem; }
.qz-q-eng { font-size:1.2rem; color:var(--text); font-weight:500; }
.qz-opts  { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:1.25rem; }
.qz-opt {
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--r-md); padding:16px 18px;
  text-align:left; font-size:.92rem; color:var(--text);
  font-family:var(--sans); cursor:pointer; line-height:1.5;
  transition:border-color .15s, background .15s;
}
.qz-opt:hover:not(:disabled) { border-color:var(--border2); background:var(--card2); }
.qz-opt:disabled { cursor:default; }
.qz-opt.correct { background:#122a1e; border-color:#2d9e6b; color:#4dd892; animation:popIn .25s ease; }
.qz-opt.wrong   { background:#2a1212; border-color:#c93a2b; color:#f08080; animation:shake .35s ease; }
.qz-opt.reveal  { background:#122a1e; border-color:#2d9e6b55; color:#4dd892; }
.qz-feedback    { text-align:center; font-size:.92rem; margin-bottom:.85rem; min-height:24px; }
.qz-feedback.ok  { color:#4dd892; }
.qz-feedback.bad { color:#f08080; }
.qz-next { display:block; width:100%; padding:14px; background:var(--red); border:none; border-radius:var(--r-md); color:#fff; font-size:.95rem; font-family:var(--sans); font-weight:500; cursor:pointer; transition:background .15s; }
.qz-next:hover { background:#a82e21; }

/* PINYIN QUIZ */
.pq-q-zh { font-family:var(--zh); font-size:4rem; color:var(--text); line-height:1.2; margin-bottom:.5rem; text-align:center; }

/* TYPE-IN MODE */
.type-card { background:var(--card); border:1px solid var(--border2); border-radius:var(--r-lg); padding:2.5rem 2rem; text-align:center; margin-bottom:1.25rem; }
.type-inp {
  width:100%; background:var(--card2); border:2px solid var(--border2);
  border-radius:var(--r-md); padding:14px 18px; color:var(--text);
  font-size:1.05rem; font-family:var(--sans); text-align:center;
  transition:border-color .2s; margin-top:1.5rem; outline:none;
}
.type-inp:focus { border-color:var(--red); }
.type-inp.correct-border { border-color:#2d9e6b; }
.type-inp.wrong-border   { border-color:#c93a2b; }
.type-submit { display:block; width:100%; margin-top:10px; padding:13px; background:var(--card2); border:1px solid var(--border2); border-radius:var(--r-md); color:var(--muted); font-size:.95rem; font-family:var(--sans); font-weight:500; cursor:pointer; transition:background .15s, color .15s; }
.type-submit:hover { background:var(--red); border-color:var(--red); color:#fff; }
.type-reveal { font-size:.82rem; color:var(--faint); text-align:center; margin-top:.6rem; cursor:pointer; text-decoration:underline; }
.type-reveal:hover { color:var(--muted); }

/* RESULTS */
.prac-results { max-width:520px; margin:0 auto; text-align:center; animation:popIn .35s ease; }
.prac-score-circle { width:140px; height:140px; border-radius:50%; margin:0 auto 1.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; border:3px solid; }
.prac-score-num { font-family:var(--serif); font-size:2.5rem; font-weight:500; line-height:1; }
.prac-score-lbl { font-size:.75rem; text-transform:uppercase; letter-spacing:.07em; margin-top:4px; }
.prac-res-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:1.25rem 0; }
.prac-res-card  { background:var(--card); border:1px solid var(--border); border-radius:var(--r-md); padding:1.1rem; }
.prac-res-num   { font-family:var(--serif); font-size:1.6rem; font-weight:500; }
.prac-res-lbl   { font-size:.75rem; color:var(--faint); text-transform:uppercase; letter-spacing:.06em; margin-top:3px; }

@media (max-width:680px) {
  .topbar { padding:0 .75rem; height:auto; flex-wrap:wrap; padding-top:.5rem; padding-bottom:.5rem; gap:6px; }
  .brand-name { display:none; }
  .brand-count { display:none; }
  .nav { flex-wrap:wrap; gap:2px; }
  .nav-btn { padding:5px 9px; font-size:.72rem; }
  .main { padding:.85rem; }
  .stats-grid { grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:1rem; }
  .stat-num { font-size:1.3rem; }
  .stat-lbl { font-size:.6rem; }
  .filter-bar { gap:6px; }
  .search-inp { font-size:.82rem; }
  .sel { font-size:.75rem; padding:7px 8px; }
  .lessons-grid { grid-template-columns:1fr; }
  .prac-modes { grid-template-columns:1fr 1fr; gap:8px; }
  .prac-mode-card { padding:1rem .85rem; }
  .prac-mode-icon { font-size:1.6rem; margin-bottom:.4rem; }
  .prac-mode-title { font-size:.88rem; }
  .prac-mode-desc { font-size:.72rem; }
  .prac-opts { padding:1rem; }
  .prac-opts-row { gap:8px; }
  .prac-lbl { min-width:60px; font-size:.8rem; }
  .count-chip { padding:5px 12px; font-size:.78rem; }
  .fc-card { min-height:220px; padding:1.75rem 1.25rem; }
  .fc-zh-lg { font-size:clamp(1.4rem,8vw,2.8rem); }
  .fc-eng-lg { font-size:1rem; }
  .fc-eng-row { font-size:.95rem; }
  .fc-pin-row { font-size:.95rem; }

const PROFILES = [
  {id:'james', defaultName:'James',    color:'#C93A2B', sampleKey:'james_mn-ver', sampleVer:'8'},
  {id:'gf',    defaultName:'Sharon',color:'#C4699A', sampleKey:'gf_mn-ver',   sampleVer:'1'},
];
let currentUser = null;

function getProfileName(p){
  return localStorage.getItem(p.id+'_displayname') || p.defaultName;
}
function saveGfName(){
  const inp=document.getElementById('gf-name-inp');
  if(!inp||!inp.value.trim())return;
  localStorage.setItem('gf_displayname',inp.value.trim());
  renderProfileCards();
  document.getElementById('gf-name-section').style.display='none';
}

function renderProfileCards(){
  const el=document.getElementById('profile-cards');
  if(!el)return;
  el.innerHTML=PROFILES.map(p=>{
    const name=getProfileName(p);
    const lessonCount=(()=>{const ks=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(p.id+'_lesson:'))ks.push(k);}}catch(e){}return ks.length;})();
    return `<div onclick="selectUser('${p.id}')" style="background:var(--card);border:2px solid var(--border);border-radius:var(--r-lg);padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='${p.color}';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='none'">
      <div style="width:64px;height:64px;border-radius:50%;background:${p.color}22;border:2px solid ${p.color}55;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-family:var(--zh);font-size:1.8rem;color:${p.color}">${name[0]||'学'}</div>
      <div style="font-family:var(--serif);font-size:1.1rem;font-weight:500;margin-bottom:4px">${name}</div>
      <div style="font-size:.78rem;color:var(--faint)">${lessonCount||'No'} lesson${lessonCount!==1?'s':''}</div>
      ${p.id==='gf'?`<div onclick="event.stopPropagation();document.getElementById('gf-name-section').style.display='block';document.getElementById('gf-name-inp').value='${getProfileName(p)}'" style="margin-top:.75rem;font-size:.72rem;color:var(--faint);text-decoration:underline;cursor:pointer">edit name</div>`:''}
    </div>`;
  }).join('');
}

function selectUser(id){
  const profile=PROFILES.find(p=>p.id===id);
  if(!profile)return;
  currentUser=profile;
  localStorage.setItem('mn-last-user',id);
  document.getElementById('pg-profiles').style.display='none';
  document.getElementById('pg-app').style.display='flex';
  // update topbar
  const nm=getProfileName(profile);
  const dot=document.getElementById('user-dot');
  const lbl=document.getElementById('user-label');
  if(dot) dot.style.background=profile.color;
  if(lbl) lbl.textContent=nm;
  loadLessons();
  gotoTab('review');
}

function switchUser(){
  currentUser=null;

/* ── storage (user-namespaced) ── */
const ls={
  get : k    => { try{ return localStorage.getItem(currentUser.id+'_'+k); }catch(e){ return null; } },
  set : (k,v)=> { try{ localStorage.setItem(currentUser.id+'_'+k, v); }catch(e){} },
  del : k    => { try{ localStorage.removeItem(currentUser.id+'_'+k); }catch(e){} },
  keys: p    => {
    const o=[], pre=currentUser.id+'_'+p;
    try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(pre)) o.push(k.slice(currentUser.id.length+1)); } }catch(e){}
    return o;
  }
};

/* ── load ── */
function loadLessons(){
  const keys=ls.keys('lesson:');
  const ver=ls.get('mn-ver');
  const isJames=currentUser.id==='james';
  const targetVer=isJames?'8':'1';
  if(isJames&&(!keys.length||ver!==targetVer)){
    SAMPLE.forEach(s=>ls.set(s.id,JSON.stringify(s)));
    ls.set('mn-ver',targetVer);
    lessons=SAMPLE.map(s=>({...s}));
  } else if(!isJames&&!keys.length){
    ls.set('mn-ver',targetVer);
    lessons=[];
  } else {
    lessons=[];
    keys.forEach(k=>{try{lessons.push(JSON.parse(ls.get(k)));}catch(e){}});
  }
  lessons.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const tot=lessons.flatMap(l=>l.vocabulary||[]).length;
  const el=document.getElementById('topbar-count');
  if(el) el.textContent=`${lessons.length} lesson${lessons.length!==1?'s':''} · ${tot} vocabulary items`;
}

function deleteLesson(id){if(!confirm('Delete this lesson?'))return;ls.del(id);loadLessons();render();}
function filterLesson(id){flt={s:'',c:'all',t:'all',l:id};gotoTab('review');}

function deleteWord(lessonId,chinese){
  if(!confirm('Delete "'+chinese+'" from the notebook?'))return;
  const raw=ls.get(lessonId);if(!raw)return;
  try{
    const lesson=JSON.parse(raw);
    lesson.vocabulary=(lesson.vocabulary||[]).filter(v=>v.chinese!==chinese);
    lesson.wordCount=lesson.vocabulary.length;
    ls.set(lessonId,JSON.stringify(lesson));
    loadLessons();render();
  }catch(e){}
}

    {l:'Sentences',  v:all.filter(v=>v.type==='sentence').length, c:tc('sentence')},
    {l:'Idioms',     v:all.filter(v=>v.type==='idiom').length,    c:tc('idiom')},

  h+=`</div><div class="filter-bar fu1">
    <div class="search-wrap"><span class="search-icon">⌕</span>
    <input class="search-inp" type="text" placeholder="Search Chinese, pinyin or English…" value="${flt.s.replace(/"/g,'&quot;')}" oninput="flt.s=this.value;render()"></div>
    <select class="sel" onchange="flt.c=this.value;render()">`;
  cats.forEach(c=>h+=`<option value="${c}"${flt.c===c?' selected':''}>${c==='all'?'All categories':c}</option>`);
  h+=`</select><select class="sel" onchange="flt.t=this.value;render()">`;
  ['all','word','phrase','sentence','idiom'].forEach(t=>h+=`<option value="${t}"${flt.t===t?' selected':''}>${t==='all'?'All types':t[0].toUpperCase()+t.slice(1)+'s'}</option>`);
  h+=`</select><select class="sel" onchange="flt.l=this.value;render()"><option value="all">All lessons</option>`;
  lessons.forEach(l=>h+=`<option value="${l.id}"${flt.l===l.id?' selected':''}>${l.lessonTitle}</option>`);
  h+=`</select>`;
  if(flt.s||flt.c!=='all'||flt.t!=='all'||flt.l!=='all')
    h+=`<button class="btn" onclick="flt={s:'',c:'all',t:'all',l:'all'};render()" style="color:var(--red);border-color:rgba(201,58,43,.35)">✕ Clear</button>`;
  h+=`</div>`;
  if(!all.length){h+=`<div class="empty fu2"><div class="empty-zh">学</div><div class="empty-ttl">No lessons yet</div><div class="empty-sub">Upload your first PDF to get started</div><button class="btn primary" onclick="gotoTab('upload')">Upload first lesson</button></div>`;return h;}
  if(!fil.length){h+=`<div class="empty fu2"><div class="empty-ttl">No results</div><div class="empty-sub">Try a different search or filter</div></div>`;return h;}
  h+=`<div class="res-info fu2">Showing ${fil.length} of ${all.length} items &nbsp;·&nbsp; rows with ▾ have example sentences — click to expand</div>`;
  h+=`<div class="tbl-wrap fu2"><table><thead><tr>`;
  ['#','Chinese','Pinyin','English','Type','Category','Lesson','Date',''].forEach(th=>h+=`<th>${th}</th>`);
  h+=`</tr></thead><tbody>`;
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  fil.forEach((v,i)=>{
    const hasEx=!!v.example,exp=expanded.has(i);
    const dt=new Date(v._ld).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});
    const rowClick=hasEx?'onclick="toggleRow('+i+')\"':'';
    h+=`<tr class="${hasEx?'expandable':''}" ${rowClick}>`;
    h+=`<td class="c-num">${i+1}</td>`;
    h+=`<td class="c-zh">${esc(v.chinese)}</td>`;
    h+=`<td class="c-pin">${esc(v.pinyin)}</td>`;
    h+=`<td class="c-eng">${esc(v.english)}</td>`;
    h+=`<td>${bdg(v.type||'word',tc(v.type))}</td>`;

    const expandIcon=hasEx?' <span style="font-size:.62rem;color:var(--blue)">'+(exp?'▴':'▾')+'</span>':'';
    h+=`<td style="font-size:.78rem;color:var(--muted);max-width:130px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v._lt)}`+expandIcon+`</div></td>`;

  });
  h+=`</tbody></table></div>`;return h;
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildDeck(){
  let pool=lessons.flatMap(l=>(l.vocabulary||[]).map(v=>({...v,_lt:l.lessonTitle,_lid:l.id})));
  if(pr.filterLesson!=='all') pool=pool.filter(v=>v._lid===pr.filterLesson);
  if(pr.filterType!=='all')   pool=pool.filter(v=>v.type===pr.filterType);
  const shuffled=shuffle(pool);
  return pr.cardLimit>0?shuffled.slice(0,pr.cardLimit):shuffled;
}

function startPractice(){
  const deck=buildDeck();
  if(!deck.length){alert('No vocabulary matches your filters.');return;}
  if(deck.length<2&&(pr.mode==='quiz'||pr.mode==='pinyin')){alert('Need at least 2 cards for this mode.');return;}
  pr.deck=deck; pr.idx=0; pr.flipped=false;
  pr.known=0; pr.unsure=0; pr.qCorrect=0; pr.qWrong=0;
  pr.chosen=null; pr.answered=false; pr.typeVal=''; pr.typeRevealed=false;
  if(pr.mode==='quiz'||pr.mode==='pinyin') buildQuizOpts();
  pr.screen='playing';
  render();
}

function buildQuizOpts(){
  if(!pr.deck.length||pr.idx>=pr.deck.length) return;
  const correct=pr.deck[pr.idx];
  const allPool=lessons.flatMap(l=>(l.vocabulary||[]).map(v=>({...v,_lt:l.lessonTitle,_lid:l.id})));
  const pool=allPool.filter(v=>v.chinese!==correct.chinese);
  const wrong=shuffle(pool).slice(0,3);
  pr.opts=shuffle([correct,...wrong]);
  pr.chosen=null; pr.answered=false;
}

function fcFlip(){pr.flipped=!pr.flipped;render();}

function fcMark(knew){
  if(knew) pr.known++; else pr.unsure++;
  pr.idx++; pr.flipped=false;
  if(pr.idx>=pr.deck.length){pr.screen='results';render();return;}
  render();
}

function qzChoose(i){
  if(pr.answered) return;
  pr.chosen=i; pr.answered=true;
  const correct=pr.opts[i].chinese===pr.deck[pr.idx].chinese;
  if(correct) pr.qCorrect++; else pr.qWrong++;
  render();
}

function qzNext(){
  pr.idx++;
  if(pr.idx>=pr.deck.length){pr.screen='results';render();return;}
  buildQuizOpts(); render();
}

function typeSubmit(){
  const inp=document.getElementById('type-inp');
  if(!inp) return;
  pr.typeVal=inp.value;
  pr.answered=true;
  const v=pr.deck[pr.idx];
  const userAns=(pr.typeVal||'').trim().toLowerCase();
  const correct=v.english.toLowerCase();
  // fuzzy: check if any key word from answer is present
  const keywords=correct.replace(/[/\-()]/g,' ').split(/\s+/).filter(w=>w.length>2);
  const isOk=keywords.some(kw=>userAns.includes(kw))||userAns===correct||correct.includes(userAns);
  if(isOk) pr.qCorrect++; else pr.qWrong++;
  render();
}

function typeReveal(){pr.typeRevealed=true;render();}

function typeNext(){
  pr.idx++;
  if(pr.idx>=pr.deck.length){pr.screen='results';render();return;}
  pr.answered=false; pr.typeVal=''; pr.typeRevealed=false;
  render();
  setTimeout(()=>{const el=document.getElementById('type-inp');if(el)el.focus();},50);
}

function pracRestart(){pr.screen='setup';render();}

function renderPractice(){
  if(pr.screen==='setup')   return renderPracSetup();
  if(pr.screen==='results') return renderPracResults();
  if(pr.mode==='flashcard') return renderFlashcard();
  if(pr.mode==='quiz')      return renderQuiz(false);
  if(pr.mode==='pinyin')    return renderQuiz(true);
  if(pr.mode==='typein')    return renderTypeIn();
  return renderFlashcard();
}

  });

/* ── shared header + progress ── */
function pracHeader(label,total,done,known,wrong){
  const pct=Math.round((done/total)*100);
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">`;
  h+=`<div style="font-size:.88rem;color:var(--muted)">${label}</div>`;
  h+=`<button class="fc-btn-nav" onclick="pracRestart()">\u2190 Setup</button>`;
  h+='</div>';
  h+=`<div class="prac-prog-wrap">`;
  h+=`<div class="prac-prog-bar"><div class="prac-prog-fill" style="width:${pct}%"></div></div>`;
  h+=`<span style="font-size:.82rem;color:#4dd892">\u2713 ${known}</span>`;
  h+=`<span style="font-size:.82rem;color:#f08080">\u2717 ${wrong}</span>`;
  h+=`<span style="font-size:.82rem;color:var(--faint)">${done}/${total}</span>`;
  h+='</div>';
  return h;
}

/* ── FLASHCARD ── */
function renderFlashcard(){
  const v=pr.deck[pr.idx];
  const total=pr.deck.length,done=pr.idx;
  const front=pr.direction==='zh2en';
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let h=`<div class="fu" style="max-width:640px;margin:0 auto">`;

  /* ── FRONT ── */

    h+=`<div class="fc-card" onclick="fcFlip()">`;
    h+=`<div class="fc-face-label">${front?'Chinese \u2192 English':'English \u2192 Chinese'} &nbsp;\u00B7&nbsp; tap to reveal</div>`;
    h+=`<div class="fc-badge-row">${bdg(v.type||'word',tc(v.type))}</div>`;

      h+=`<div class="${isLong(v.chinese)?'fc-zh-sm':'fc-zh-lg'}">${esc(v.chinese)}</div>`;

    }

    h+=`</div>`;

  /* ── BACK ── */
  } else {
    h+=`<div class="fc-card revealed" onclick="fcFlip()">`;
    h+=`<div class="fc-face-label">Answer &nbsp;\u00B7&nbsp; tap to go back</div>`;
    if(front){
      h+=`<div class="fc-badge-row">${bdg(v.type||'word',tc(v.type))}</div>`;
      h+=`<div class="fc-pin-row">${esc(v.pinyin)}</div>`;
      h+=`<div class="${isLong(v.english)?'fc-eng-row':'fc-eng-lg'}">${esc(v.english)}</div>`;
      if(v.example) h+=`<div class="fc-ex-row">${esc(v.example)}</div>`;
    } else {
      h+=`<div class="fc-badge-row">${bdg(v.type||'word',tc(v.type))}</div>`;
      h+=`<div class="${isLong(v.chinese)?'fc-zh-sm':'fc-zh-lg'}">${esc(v.chinese)}</div>`;
      h+=`<div class="fc-pin-row">${esc(v.pinyin)}</div>`;
      if(v.example) h+=`<div class="fc-ex-row">${esc(v.example)}</div>`;
    }
    h+=`</div>`;

    // know / unsure buttons
    h+=`<div class="fc-actions">`;
    h+=`<button class="fc-btn unsure" onclick="fcMark(false)">\u2717 &nbsp; Need more practice</button>`;
    h+=`<button class="fc-btn know"   onclick="fcMark(true)">\u2713 &nbsp; Got it!</button>`;
    h+=`</div>`;
  }

  // progress dots
  h+=`<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:.25rem">`;
  pr.deck.forEach((_,i)=>{
    const w=Math.max(6,Math.min(20,Math.floor(600/pr.deck.length)-5));
    const col=i<pr.idx?(i%2===0?'#2d9e6b':'#c93a2b'):i===pr.idx?'var(--red)':'var(--border2)';
    const op=i<=pr.idx?1:.3;
    h+=`<div style="width:${w}px;height:5px;border-radius:3px;background:${col};opacity:${op};transition:background .3s"></div>`;
  });
  h+=`</div></div>`;
  return h;
}

/* ── QUIZ (multiple choice & pinyin) ── */
function renderQuiz(isPinyin){
  const v=pr.deck[pr.idx];
  const total=pr.deck.length,done=pr.idx;
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let h=`<div class="fu" style="max-width:640px;margin:0 auto">`;
  h+=pracHeader(modeLabel,total,done,pr.qCorrect,pr.qWrong);

  h+='<div class="qz-wrap">';
  h+='<div class="qz-q-card">';
  if(isPinyin){
    h+=`<div class="qz-q-label">${bdg(v.type||'word',tc(v.type))} &nbsp; Which pinyin matches?</div>`;
    h+=`<div class="qz-q-zh">${esc(v.chinese)}</div>`;
    h+=`<div style="font-size:.88rem;color:var(--muted);margin-top:.5rem">${esc(v.english)}</div>`;
  } else {
    h+=`<div class="qz-q-label">${bdg(v.type||'word',tc(v.type))} &nbsp; What does this mean?</div>`;
    h+=`<div class="qz-q-zh">${esc(v.chinese)}</div>`;
    h+=`<div class="qz-q-pin">${esc(v.pinyin)}</div>`;
  }
  h+='</div>';

  h+='<div class="qz-opts">';
  pr.opts.forEach((opt,i)=>{
    const isCorrect=opt.chinese===v.chinese;
    let cls='qz-opt';
    if(pr.answered){
      if(i===pr.chosen&&isCorrect) cls+=' correct';
      else if(i===pr.chosen&&!isCorrect) cls+=' wrong';
      else if(isCorrect) cls+=' reveal';
    }
    const label=isPinyin?esc(opt.pinyin):esc(opt.english);
    h+=`<button class="${cls}" ${pr.answered?'disabled':''} onclick="qzChoose(${i})">${label}</button>`;
  });
  h+='</div>';

  if(pr.answered){
    const ok=pr.opts[pr.chosen]?.chinese===v.chinese;
    h+=`<div class="qz-feedback ${ok?'ok':'bad'}">${ok?'\u2713 Correct!':'\u2717 Not quite \u2014 the right answer is highlighted in green'}</div>`;
    if(v.example) h+=`<div style="font-size:.85rem;color:var(--muted);font-style:italic;text-align:center;margin-bottom:.85rem;padding:0 .5rem">"${esc(v.example)}"</div>`;
    const isLast=pr.idx+1>=pr.deck.length;
    h+=`<button class="qz-next" onclick="qzNext()">${isLast?'See results \u2192':'Next question \u2192'}</button>`;
  }
  h+='</div></div>';
  return h;
}

/* ── TYPE-IN MODE ── */
function renderTypeIn(){
  const v=pr.deck[pr.idx];
  const total=pr.deck.length,done=pr.idx;
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let h=`<div class="fu" style="max-width:600px;margin:0 auto">`;
  h+=pracHeader('Type the Answer',total,done,pr.qCorrect,pr.qWrong);

  h+='<div class="type-card">';
  h+=`<div class="qz-q-label">${bdg(v.type||'word',tc(v.type))} &nbsp; Type the English meaning</div>`;
  h+=`<div class="fc-zh">${esc(v.chinese)}</div>`;
  h+=`<div class="fc-pin">${esc(v.pinyin)}</div>`;

  if(!pr.answered){
    h+=`<input class="type-inp" id="type-inp" type="text" placeholder="Type English meaning…" autocomplete="off" onkeydown="if(event.key==='Enter')typeSubmit()">`;
    h+=`<button class="type-submit" onclick="typeSubmit()">Check answer \u2192</button>`;
    h+=`<div class="type-reveal" onclick="typeReveal()">I don\u2019t know \u2014 show me</div>`;
  } else {
    const userAns=(pr.typeVal||'').trim().toLowerCase();
    const correct=v.english.toLowerCase();
    const keywords=correct.replace(/[/\-()]/g,' ').split(/\s+/).filter(w=>w.length>2);
    const isOk=pr.typeRevealed?false:(keywords.some(kw=>userAns.includes(kw))||userAns===correct||correct.includes(userAns));
    if(pr.typeRevealed){
      h+=`<div style="margin-top:1.25rem;padding:1rem;background:rgba(201,58,43,.08);border-radius:var(--r-md);border:1px solid rgba(201,58,43,.25)">`;
      h+=`<div style="font-size:.78rem;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem">Answer</div>`;
      h+=`<div style="font-size:1.1rem;color:#4dd892">${esc(v.english)}</div>`;
      h+='</div>';
    } else {
      const borderCls=isOk?'correct-border':'wrong-border';
      h+=`<input class="type-inp ${borderCls}" type="text" value="${esc(pr.typeVal)}" disabled>`;
      h+=`<div style="margin-top:.75rem;font-size:.92rem;${isOk?'color:#4dd892':'color:#f08080'}">${isOk?'\u2713 Great answer!':'\u2717 Not quite'}</div>`;
      if(!isOk) h+=`<div style="font-size:.88rem;color:var(--muted);margin-top:.35rem">Correct: <span style="color:#4dd892">${esc(v.english)}</span></div>`;
    }
    if(v.example) h+=`<div style="font-size:.83rem;color:var(--muted);font-style:italic;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">"${esc(v.example)}"</div>`;
    const isLast=pr.idx+1>=pr.deck.length;
    h+=`<button class="type-submit" style="margin-top:1rem;background:var(--red);border-color:var(--red);color:#fff" onclick="typeNext()">${isLast?'See results \u2192':'Next \u2192'}</button>`;
  }
  h+='</div></div>';

  if(!pr.answered){
    setTimeout(()=>{const el=document.getElementById('type-inp');if(el)el.focus();},30);
  }
  return h;
}

/* ── RESULTS ── */
function renderPracResults(){
  const isFC=pr.mode==='flashcard';
  const total=pr.deck.length;
  const correct=isFC?pr.known:pr.qCorrect;
  const wrong=isFC?pr.unsure:pr.qWrong;
  const pct=Math.round((correct/total)*100);
  const color=pct>=80?'#2d9e6b':pct>=50?'#c4933a':'#c93a2b';
  const msg=pct>=80?'Excellent! \uD83C\uDF89':pct>=60?'Good work! \uD83D\uDCAA':pct>=40?'Getting there! \uD83D\uDCDA':'Keep practising! \u52A0\u6CB9!';
  const modeLabels={flashcard:'Flashcards',quiz:'Multiple Choice',pinyin:'Pinyin Quiz',typein:'Type-In'};

  let h=`<div class="prac-results fu">`;
  h+=`<div style="font-size:.82rem;color:var(--faint);margin-bottom:1.25rem;text-transform:uppercase;letter-spacing:.07em">${modeLabels[pr.mode]||''} \u2014 ${pr.deck.length} cards</div>`;
  h+=`<div class="prac-score-circle" style="border-color:${color}">`;
  h+=`<div class="prac-score-num" style="color:${color}">${pct}%</div>`;
  h+=`<div class="prac-score-lbl" style="color:${color}">${isFC?'Known':'Score'}</div>`;
  h+='</div>';
  h+=`<div style="font-family:var(--serif);font-size:1.3rem;margin-bottom:.5rem">${msg}</div>`;
  h+=`<div style="font-size:.88rem;color:var(--muted);margin-bottom:1.5rem">You reviewed ${total} card${total!==1?'s':''}</div>`;
  h+='<div class="prac-res-grid">';
  h+=`<div class="prac-res-card"><div class="prac-res-num" style="color:#4dd892">${correct}</div><div class="prac-res-lbl">${isFC?'Known':'Correct'}</div></div>`;
  h+=`<div class="prac-res-card"><div class="prac-res-num" style="color:#f08080">${wrong}</div><div class="prac-res-lbl">${isFC?'Need practice':'Incorrect'}</div></div>`;
  h+='</div>';
  h+='<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
  h+=`<button class="btn primary" onclick="startPractice()">Practice again</button>`;
  h+=`<button class="btn" onclick="pracRestart()">Change settings</button>`;
  h+='</div></div>';
  return h;
}

/* ════════════════════════════════
   SENTENCE ANALYSER
════════════════════════════════ */
async function analyseSentence(){
  const ta=document.getElementById('sn-ta');
  if(!ta)return;
  sn.text=ta.value.trim();
  if(!sn.text){sn.msg='Please paste a Chinese sentence first.';sn.err=true;sn.ok=false;render();return;}
  const apiKey=(ls.get('mn-apikey')||'').trim();
  if(!apiKey){sn.msg='Add your Anthropic API key in the Upload PDF tab first.';sn.err=true;sn.ok=false;render();return;}
  sn.busy=true;sn.msg='Analysing sentence…';sn.ok=false;sn.err=false;sn.preview=null;render();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:[{type:'text',text:'Break down this Chinese text into vocabulary for a language learner. Extract every meaningful word, phrase, and idiom worth learning. Return ONLY valid JSON, no markdown:\n{"lessonTitle":"3-5 word title describing the topic","category":"Daily Life|Travel|Work & Business|Idioms & Expressions|Food|People & Relationships|Other","vocabulary":[{"chinese":"characters","pinyin":"pinyin with tones","english":"meaning","type":"word|phrase|sentence|idiom","example":"the original sentence if this word appears in it, else empty string"}]}\nText: '+sn.text}]}]})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message||'API error');
    const txt=data.content.map(i=>i.text||'').join('');
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    sn.preview=parsed;sn.busy=false;sn.msg='';render();
  }catch(err){
    sn.busy=false;sn.err=true;sn.ok=false;sn.msg='Error: '+err.message;render();
  }
}

function snToggleWord(i){
  if(!sn.preview)return;
  sn.preview.vocabulary[i]._selected=!sn.preview.vocabulary[i]._selected;
  render();
}
function snSelectAll(val){if(!sn.preview)return;sn.preview.vocabulary.forEach(v=>v._selected=val);render();}

function snSave(){
  if(!sn.preview)return;
  const toSave=(sn.preview.vocabulary||[]).filter(v=>v._selected!==false);
  if(!toSave.length){alert('Select at least one word to save.');return;}
  const lid='lesson:'+Date.now();
  const lesson={id:lid,fileName:'Sentence Analysis',lessonTitle:sn.preview.lessonTitle||'Sentence Vocabulary',category:sn.preview.category||'Other',vocabulary:toSave.map(v=>({chinese:v.chinese,pinyin:v.pinyin,english:v.english,type:v.type,example:v.example||''})),date:new Date().toISOString(),wordCount:toSave.length};
  ls.set(lid,JSON.stringify(lesson));
  loadLessons();
  sn={text:'',busy:false,msg:'Saved '+toSave.length+' words to your notebook!',ok:true,err:false,preview:null};
  render();
  setTimeout(()=>gotoTab('review'),1800);
}

function renderSentences(){
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let h='<div class="fu" style="max-width:760px;margin:0 auto">';
  h+='<div style="font-family:var(--serif);font-size:1.25rem;font-weight:500;margin-bottom:5px">Sentence Analyser</div>';
  h+='<p style="font-size:.9rem;color:var(--muted);margin-bottom:1.5rem">Paste any Chinese text and Claude will break it into vocabulary you can add to your notebook.</p>';

  // text area
  h+='<div style="background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1rem">';

  h+=`<div style="display:flex;gap:10px;margin-top:.85rem;align-items:center">`;
  h+=`<button class="btn primary" style="padding:11px 24px;font-size:.92rem" onclick="analyseSentence()" ${sn.busy?'disabled':''}>`;
  h+=sn.busy?'<span class="spinner" style="width:15px;height:15px;margin-right:6px"></span> Analysing…':'🔍 &nbsp;Extract vocabulary';
  h+='</button>';
  if(sn.text&&!sn.busy) h+=`<button class="btn" onclick="sn.text='';sn.preview=null;sn.msg='';render()">Clear</button>`;
  h+='</div></div>';

  // status
  if(sn.msg){
    h+=`<div style="padding:.9rem 1.25rem;border-radius:var(--r-md);margin-bottom:1rem;font-size:.9rem;`;
    h+=sn.ok?'background:#122a1e;color:#4dd892;border:1px solid rgba(45,158,107,.3)':'background:#2a1212;color:#f08080;border:1px solid rgba(201,58,43,.3)';
    h+=`">${esc(sn.msg)}</div>`;
  }

  if(sn.preview&&sn.preview.vocabulary){
    const vocab=sn.preview.vocabulary;
    const selCount=vocab.filter(v=>v._selected!==false).length;
    h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem">`;
    // preview header
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)">`;
    h+=`<div><span style="font-family:var(--serif);font-size:.95rem;font-weight:500">${esc(sn.preview.lessonTitle)}</span>`;
    h+=` &nbsp;${bdg(sn.preview.category,cc(sn.preview.category))}`;
    h+=`<span style="font-size:.8rem;color:var(--faint);margin-left:10px">${vocab.length} words found</span></div>`;
    h+=`<div style="display:flex;gap:8px">`;
    h+=`<button class="btn" onclick="snSelectAll(true)" style="font-size:.78rem;padding:5px 12px">Select all</button>`;
    h+=`<button class="btn" onclick="snSelectAll(false)" style="font-size:.78rem;padding:5px 12px">Deselect all</button>`;
    h+=`</div></div>`;
    // word grid
    h+=`<div style="padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:8px">`;
    vocab.forEach((v,i)=>{
      const sel=v._selected!==false;
      const bg=sel?'var(--card2)':'var(--surface)';
      const bord=sel?'1.5px solid var(--red)':'1px solid var(--border)';
      h+=`<div onclick="snToggleWord(${i})" style="background:${bg};border:${bord};border-radius:var(--r-md);padding:10px 14px;cursor:pointer;min-width:120px;transition:all .15s">`;
      h+=`<div style="font-family:var(--zh);font-size:1.4rem;margin-bottom:3px">${esc(v.chinese)}</div>`;
      h+=`<div style="font-family:var(--mono);font-style:italic;color:var(--gold);font-size:.78rem;margin-bottom:3px">${esc(v.pinyin)}</div>`;
      h+=`<div style="font-size:.78rem;color:var(--muted);line-height:1.4">${esc(v.english)}</div>`;
      h+=`<div style="margin-top:5px">${bdg(v.type||'word',tc(v.type),true)}</div>`;
      if(sel) h+=`<div style="font-size:.65rem;color:var(--red);margin-top:4px;font-weight:500">\u2713 selected</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
    h+=`</div>`;
    h+=`<button class="btn primary" onclick="snSave()" style="width:100%;padding:14px;font-size:.95rem;justify-content:center" ${selCount===0?'disabled':''}>`;
    h+=`Save ${selCount} word${selCount!==1?'s':''} to notebook \u2192</button>`;
  }

  h+='</div>';
  return h;
}

function renderLessons(){
  let h=`<div class="lessons-hdr fu"><div style="font-family:var(--serif);font-size:1.1rem;font-weight:500">All lessons (${lessons.length})</div><button class="btn primary" onclick="gotoTab('upload')">+ Upload new PDF</button></div>`;
  if(!lessons.length){h+=`<div class="empty fu1"><div class="empty-zh">学</div><div class="empty-ttl">No lessons yet</div><div class="empty-sub">Upload your first lesson PDF</div><button class="btn primary" onclick="gotoTab('upload')">Upload now</button></div>`;return h;}
  h+=`<div class="lessons-grid fu1">`;
  lessons.forEach(l=>{
    const vocab=l.vocabulary||[],counts={};
    vocab.forEach(v=>{counts[v.type]=(counts[v.type]||0)+1;});
    const dt=new Date(l.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const eid=l.id.replace(/'/g,"&#39;");
    h+=`<div class="lcard"><div class="lcard-accent" style="background:${cc(l.category)}"></div>
      <div class="lcard-title">${l.lessonTitle}</div>
      <div class="lcard-meta">${l.fileName} &nbsp;·&nbsp; ${dt}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">${bdg(l.category,cc(l.category))}${bdg(vocab.length+' items','#4A5568')}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;flex:1;margin-bottom:4px">`;
    Object.entries(counts).forEach(([t,n])=>h+=`<span style="font-size:.67rem;padding:1px 7px;border-radius:3px;background:${tc(t)}1a;color:${tc(t)}">${n} ${t}${n>1?'s':''}</span>`);
    h+=`</div><div class="lcard-acts"><button class="btn" style="flex:1" onclick="filterLesson('${eid}')">Review →</button><button class="btn danger" onclick="deleteLesson('${eid}')">Delete</button></div></div>`;
  });
  h+=`</div>`;return h;
}

function renderUpload(){
  const apiKey=ls.get('mn-apikey')||'';
  const zoneIcon=busy?'<div style="margin-bottom:.75rem"><span class="spinner"></span></div>':'<div style="font-family:var(--zh);font-size:2.5rem;color:var(--red);opacity:.5;margin-bottom:.75rem">\u6587</div>';
  const zoneClick=busy?'':'document.getElementById(\'fup\').click()';
  let h='<div class="upload-wrap fu">';
  h+='<div style="font-family:var(--serif);font-size:1.15rem;font-weight:500;margin-bottom:6px">Upload lesson PDF</div>';
  h+='<p style="font-size:.83rem;color:var(--muted);margin-bottom:1.5rem">Claude AI extracts and categorizes every word, phrase, sentence and idiom automatically from your teacher\'s notes.</p>';
  h+=`<div class="upload-zone${busy?' busy':''}" onclick="${zoneClick}">`+zoneIcon;
  h+=`<div class="upload-title">${busy?'Processing your lesson\u2026':'Click to select your lesson PDF'}</div>`;
  h+=`<div class="upload-sub" style="font-size:.8rem;color:var(--faint)">${busy?'Extracting vocabulary with AI \u2014 please wait':'Any PDF format from your teacher works'}</div>`;
  h+='</div><input type="file" id="fup" accept=".pdf" style="display:none" onchange="doUpload(this)">';

    h+=`<div class="status-box"><div class="status-msg${upOk?' ok':upErr?' err':''}">${upMsg}</div>`;
    if(busy)h+=`<div class="prog-bar"><div class="prog-fill" style="width:${upPct}%"></div></div>`;
    h+=`</div>`;
  }
  h+=`<div class="apikey-box">
    <label class="apikey-lbl" for="akey">Anthropic API key — required to extract vocabulary from PDFs</label>
    <input class="inp" type="password" id="akey" placeholder="sk-ant-…" value="${apiKey}" oninput="ls.set('mn-apikey',this.value)" style="font-family:var(--mono);font-size:.8rem">
    <div class="apikey-note">Stored only in your browser, sent directly to Anthropic only. Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
  </div>
  <div class="upload-types">`;
  [['word','Words','Single vocabulary items',tc('word')],['phrase','Phrases','Multi-word expressions',tc('phrase')],['sentence','Sentences','Full example sentences',tc('sentence')],['idiom','Idioms','惯用语 and internet slang',tc('idiom')]].forEach(([t,l,d,c])=>h+=`<div class="utype-card">${bdg(l,c)}<div style="font-size:.74rem;color:var(--faint);margin-top:8px">${d}</div></div>`);
  h+=`</div></div>`;return h;
}

async function doUpload(input){
  const file=input.files[0];if(!file)return;
  const apiKey=(ls.get('mn-apikey')||document.getElementById('akey')?.value||'').trim();
  if(!apiKey){upMsg='Please enter your Anthropic API key above.';upErr=true;upOk=false;render();return;}
  if(!file.name.toLowerCase().endsWith('.pdf')){upMsg='Please select a PDF file.';upErr=true;upOk=false;render();return;}
  busy=true;upOk=false;upErr=false;upMsg='Reading PDF file…';upPct=10;render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Failed to read file'));r.readAsDataURL(file);});
    upMsg='Sending to Claude AI…';upPct=30;render();
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Extract ALL vocabulary from this Mandarin lesson PDF. Return ONLY valid JSON, no markdown fences:\n{"lessonTitle":"short topic 3-6 words","category":"Daily Life|Travel|Work & Business|Idioms & Expressions|Food|People & Relationships|Other","vocabulary":[{"chinese":"chars","pinyin":"tones","english":"meaning","type":"word|phrase|sentence|idiom","example":"example sentence from PDF if present, else empty string"}]}\nInclude every item: words, phrases, sentences, idioms, slang. Preserve Chinese exactly.'}]}]})});
    upMsg='Processing results…';upPct=75;render();
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message||'API error');
    const txt=data.content.map(i=>i.text||'').join('');
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    upMsg='Saving to notebook…';upPct=90;render();
    const lid='lesson:'+Date.now();
    const lesson={id:lid,fileName:file.name,lessonTitle:parsed.lessonTitle,category:parsed.category,vocabulary:parsed.vocabulary||[],date:new Date().toISOString(),wordCount:(parsed.vocabulary||[]).length};
    ls.set(lid,JSON.stringify(lesson));
    loadLessons();
    busy=false;upOk=true;upErr=false;upPct=100;
    upMsg=`Done! Extracted ${lesson.wordCount} vocabulary items from "${lesson.lessonTitle}"`;
    render();setTimeout(()=>gotoTab('review'),2200);
  }catch(err){
    busy=false;upErr=true;upOk=false;upMsg='Error: '+err.message;render();
  }
  if(input)input.value='';
}
